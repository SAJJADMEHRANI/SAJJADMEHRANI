<svg width="100%" viewBox="0 0 900 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #0d1117; }
      .name {
        font-family: "Segoe UI", Helvetica, Arial, sans-serif;
        font-size: 36px;
        font-weight: 700;
        fill: #ffffff;
        letter-spacing: 1px;
        opacity: 0;
        animation: fadeup 0.7s ease forwards;
        animation-delay: 0.1s;
      }
      .sub {
        font-family: "Segoe UI", Helvetica, Arial, sans-serif;
        font-size: 13px;
        font-weight: 400;
        fill: #666666;
        letter-spacing: 3px;
        opacity: 0;
        animation: fadeup 0.7s ease forwards;
        animation-delay: 0.4s;
      }
      .tag {
        font-family: "Segoe UI", Helvetica, Arial, sans-serif;
        font-size: 11px;
        fill: #444444;
        letter-spacing: 1px;
        opacity: 0;
        animation: fadein 0.6s ease forwards;
      }
      .t1 { animation-delay: 0.8s; }
      .t2 { animation-delay: 1.0s; }
      .t3 { animation-delay: 1.2s; }
      .t4 { animation-delay: 1.4s; }
      .accent {
        stroke: #222222;
        stroke-width: 1;
        opacity: 0;
        animation: fadein 0.8s ease forwards;
        animation-delay: 0.3s;
      }
      .dot {
        fill: #333333;
        opacity: 0;
        animation: fadein 0.4s ease forwards;
      }
      .d1 { animation-delay: 1.6s; }
      .d2 { animation-delay: 1.8s; }
      .d3 { animation-delay: 2.0s; }
      @keyframes fadeup {
        from { opacity: 0; transform: translateY(8px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes fadein {
        from { opacity: 0; }
        to   { opacity: 1; }
      }
    </style>
  </defs>

  <rect class="bg" width="900" height="160" />

  <!-- left accent bar -->
  <rect x="0" y="0" width="3" height="160" fill="#222222" />

  <!-- horizontal rule -->
  <line class="accent" x1="40" y1="105" x2="860" y2="105" />

  <!-- name -->
  <text class="name" x="40" y="72">Sajjad Mehrani</text>

  <!-- subtitle -->
  <text class="sub" x="42" y="95">SOFTWARE ENGINEER &amp; PRODUCT BUILDER</text>

  <!-- tags -->
  <text class="tag t1" x="40"  y="125">Laravel</text>
  <text class="tag t2" x="105" y="125">PHP</text>
  <text class="tag t3" x="148" y="125">DevOps</text>
  <text class="tag t4" x="218" y="125">AI Tools</text>

  <!-- dots -->
  <circle class="dot d1" cx="840" cy="40" r="2" />
  <circle class="dot d2" cx="855" cy="52" r="2" />
  <circle class="dot d3" cx="848" cy="64" r="2" />

</svg>