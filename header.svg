<svg width="900" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #0d1117; }
      .name {
        font-family: "Segoe UI", Helvetica, Arial, sans-serif;
        font-size: 42px;
        font-weight: 700;
        fill: #ffffff;
        letter-spacing: 2px;
      }
      .title {
        font-family: "Segoe UI", Helvetica, Arial, sans-serif;
        font-size: 16px;
        font-weight: 400;
        fill: #888888;
        letter-spacing: 4px;
      }
      .line {
        stroke: #ffffff;
        stroke-width: 1;
        opacity: 0;
        animation: fadeline 1s ease forwards;
        animation-delay: 0.4s;
      }
      .name {
        opacity: 0;
        animation: fadeup 0.8s ease forwards;
        animation-delay: 0.1s;
      }
      .title {
        opacity: 0;
        animation: fadeup 0.8s ease forwards;
        animation-delay: 0.5s;
      }
      .dot {
        fill: #ffffff;
        opacity: 0;
        animation: popin 0.4s ease forwards;
      }
      .dot1 { animation-delay: 1.0s; }
      .dot2 { animation-delay: 1.2s; }
      .dot3 { animation-delay: 1.4s; }
      @keyframes fadeup {
        from { opacity: 0; transform: translateY(10px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes fadeline {
        from { opacity: 0; }
        to   { opacity: 0.2; }
      }
      @keyframes popin {
        from { opacity: 0; r: 0; }
        to   { opacity: 0.5; r: 3; }
      }
    </style>
  </defs>

  <rect class="bg" width="900" height="200" />

  <!-- decorative horizontal line -->
  <line class="line" x1="60" y1="148" x2="840" y2="148" />

  <!-- name -->
  <text class="name" x="60" y="110">Sajjad Mehrani</text>

  <!-- title -->
  <text class="title" x="63" y="138">SOFTWARE ENGINEER &amp; PRODUCT BUILDER</text>

  <!-- decorative dots -->
  <circle class="dot dot1" cx="780" cy="80" r="3" />
  <circle class="dot dot2" cx="800" cy="68" r="3" />
  <circle class="dot dot3" cx="820" cy="80" r="3" />

</svg>